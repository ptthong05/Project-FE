<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variables</title>
</head>
<body>
    <h2>Nội dung h2</h2>
    <h3>Nội dung h3</h3>
    <h4>Nội dung h4</h4>
    <p>Nội dung thẻ p</p>
</body>
</html>

<style>
    :root {
        --title: aqua;
        --description: yellow;
    }


    h2 {
        color: var(--title);
    }

    p {
        color: var(--description);
    }

    /* Cục bộ khai báo trong thẻ */
    h3 {
        --local-color: red;
        color: var(--local-color);
    }
</style>
