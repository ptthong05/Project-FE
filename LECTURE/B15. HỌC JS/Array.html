<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array</title>
</head>
<body>
    <script>
        var list = ["HTML5", "CSS3", "Javascript"];
	    console.log(list.toString()); // Trả về: "HTML5,CSS3,Javascript"


        console.log(list.join()); // Trả về: "HTML5,CSS3,Javascript"
        console.log(list.join(",")); // Trả về: "HTML5,CSS3,Javascript"
        console.log(list.join("")); // Trả về: "HTML5CSS3Javascript"
        console.log(list.join(", ")); // Trả về: "HTML5, CSS3, Javascript"
        console.log(list.join(" - ")); // Trả về: "HTML5 - CSS3 - Javascript"


        console.log(list.pop()); // Trả về: "Javascript" VÌ Javascript là phần tủ cuối cùng
	    console.log(list); // Trả về: ["HTML5", "CSS3"]


        console.log(list.push("Bootstrap 4", "ReactJS")); // Trả về: 5
	    console.log(list);
	    // Trả về: ["HTML5", "CSS3", "Javascript", "Bootstrap 4", "ReactJS"]



        console.log(list.splice(2, 0, "Bootstrap 4", "ReactJS")); // Trả về: []
	    console.log(list);                    // 2 LÀ VỊ TRÍ THÊM PHẦN TỬ VÀ 0 LÀ VỊ TRÍ XOÁ PHẦN TỬ (CUỐI CÙNG)
	    // Trả về: ["HTML5", "CSS3", "Bootstrap 4", "ReactJS", "Javascript"]



        var list = ["HTML5", "CSS3", "Javascript"];
        var list2 = ["Bootstrap 4", "ReactJS"];
        console.log(list.concat(list2));
        // Trả về: ["HTML5", "CSS3", "Javascript", "Bootstrap 4", "ReactJS"]
        console.log(list);
        // Trả về: ["HTML5", "CSS3", "Javascript"]



        var list = ["HTML5", "CSS3", "Javascript", "Bootstrap 4", "ReactJS"];
        console.log(list.slice(3)); // Trả về: ["Bootstrap 4", "ReactJS"]              // K ĐIỀN END SẼ CẮT TỪ VỊ TRÍ 3 ĐẾN HẾT 
        console.log(list.slice(1, 3)); // Trả về: ["CSS3", "Javascript"]              // CẮT ARRAY Ở VỊ TRÍ 1 VÀ 3
        console.log(list.slice(-3, -1)); // Trả về: ["Javascript", "Bootstrap 4"]       // TÍNH THEO CHIỀU NGƯỢC LẠI PHẢI SANG TRÁI
        console.log(list);
        // Trả về: ["HTML5", "CSS3", "Javascript", "Bootstrap 4", "ReactJS"]            // K ẢNH HƯỞNG MẢNG BAN ĐẦU 
    </script>
</body>
</html>
