    <script>
        // Ví dụ 2:Viết chương trình cho người dùng nhập vào số n lớn hơn 0, sau đó dựa vào n tính giá trị của biểu thức:
	    //     bieuThuc = 1/n + 2/n + 3/n + ... + n/n.
        
        function tinhBieuThuc(n) {
            let ketQua = 0;
            for(let i = 1; i <= n; i++) {
                ketQua += i/n;
            }
            return ketQua;
        }

        let n;
        do {
            n = prompt("Nhap so n");
            n = parseInt(n);      // parseInt(n) CHUYỂN N STRING THÀNH INT

            } else {
