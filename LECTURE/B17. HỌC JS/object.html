<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Object</title>
</head>
<body>
    <script>
        let infoUser = {
            name: "Pham Tan Thong",
            age: 20,
            phone: "094774874848",
            address: "HCM",
        };

        infoUser.uni = "UTH";       // THÊM KEY MỚI VÀO OBJECT
        infoUser["dia-chi"] = "49/29a";
        
        delete infoUser.age;      // XOÁ KEY 
        delete infoUser['dia-chi'];

        console.log(infoUser);
        
    </script>
</body>
</html>
