<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EX</title>
</head>
<body>
    <header class="header">Header</header>
    <div class="main">
        <div class="sidebar1">Sidebar1</div>
        <div class="article">Article</div>
        <div class="sidebar2">Sidebar2</div>
        <div class="clear-fix"></div>
    </div>
    <footer class="footer">Footer</footer>

</body>
</html>

<style>
    .header {
        background-color: #CCCCCC;
        padding: 20px;
        text-align: center;
        margin-bottom: 5px;
    }

    .sidebar1 {
        background-color: #CCCCCC;
        text-align: center;
        margin-bottom: 5px;
        width: 25%;
        float: left;
    }

    .article {
        background-color: #CCCCCC;
        text-align: center;
        margin-bottom: 5px;
        margin-left: 15px;
        margin-right: 15px;
        width: calc(50% - 30px);
        float: left;
    }

    .sidebar2 {
        background-color: #CCCCCC;
        text-align: center;
        margin-bottom: 5px;
        width: 25%;
        float: right;
    }

    /* Để footer k ăn box trên */
    .clear-fix {
        clear: both;
    }

    .footer {
        background-color: #CCCCCC;
        padding: 20px;
        text-align: center;
    }
</style>
