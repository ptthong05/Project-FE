<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Switch</title>
</head>
<body>
    <script>
        var age = 19;
        switch(age) {
            case 1:
            case 2:
            case 3:        
                console.log("Bạn k đc mua vé xem phim");
                break;
            case 19:
                console.log("Bạn đc mua vé xem phim");
                break;
            default:
                console.log("K xác định");    
                break;
        }
    </script>
</body>
</html>
