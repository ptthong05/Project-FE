<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>  Math Functions</title>
</head>
<body>
    <div class="parent">
        <div class="child">Child</div>
    </div>
</body>
</html>

<style>
    .parent {
        background-color: aqua;
        width: max(500px, 50%);       /* số nào lớn hơn sẽ lấy */
        height: 300px;
    }

    .child {
        background-color: blue;
        width: calc(50% - 30px);
    }
</style>
